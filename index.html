<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-theme">
    <!-- Noise texture overlay -->
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Side Panel -->
    <aside id="side-panel" class="side-panel" aria-label="Settings panel">
        <div class="panel-header">
            <div class="wordmark">
                <span class="wordmark-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    </svg>
                </span>
                <h1>whisper<span class="wordmark-dot">.</span></h1>
            </div>
            <button id="panel-close" class="panel-collapse-btn" aria-label="Collapse sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="11,7 6,12 11,17"></polyline>
                    <polyline points="18,7 13,12 18,17"></polyline>
                </svg>
            </button>
        </div>

        <div class="panel-content">
            <!-- Input Device -->
            <div class="panel-section">
                <label for="input-device" class="panel-label">Input Device</label>
                <select id="input-device" class="panel-select">
                    <option value="">System Default</option>
                </select>
            </div>

            <!-- Noise Cancellation Toggle -->
            <div class="panel-section">
                <div class="panel-toggle-row">
                    <div class="panel-toggle-info">
                        <span class="panel-label">Noise Cancellation</span>
                        <span class="panel-sublabel">Filter background hum and static</span>
                    </div>
                    <label class="toggle-switch" for="noise-toggle">
                        <input type="checkbox" id="noise-toggle" role="switch">
                        <span class="toggle-slider" aria-hidden="true"></span>
                    </label>
                </div>
            </div>

            <!-- Model Picker -->
            <div class="panel-section">
                <label for="model-select" class="panel-label">Model</label>
                <select id="model-select" class="panel-select">
                    <option value="whisper">Whisper (Stable)</option>
                    <option value="mai-transcribe">MAI-Transcribe (Preview)</option>
                </select>
            </div>
        </div>

        <!-- Panel Footer -->
        <div class="panel-footer">
            <button id="theme-toggle" class="panel-footer-btn" aria-label="Toggle theme">
                <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path id="moon-icon" style="display:block;" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    <g id="sun-icon" style="display:none;">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </g>
                </svg>
            </button>
            <button id="settings-button" class="panel-footer-btn" aria-label="API Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </aside>

    <header>
        <!-- Hamburger — only visible when sidebar is collapsed -->
        <button id="panel-toggle" class="header-btn panel-toggle-btn" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <!-- Wordmark in header — only visible when sidebar is collapsed -->
        <div class="header-wordmark">
            <div class="wordmark">
                <span class="wordmark-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    </svg>
                </span>
                <h1>whisper<span class="wordmark-dot">.</span></h1>
            </div>
        </div>
    </header>

    <!-- Hidden backdrop for mobile hover-preview dismiss -->
    <div id="panel-backdrop" class="panel-backdrop" aria-hidden="true"></div>

    <div class="container" role="main">
        <!-- Controls Area - Hero -->
        <div class="controls-area card-animate" style="--card-index: 0;">
            <!-- Visualizer -->
            <div id="visualizer-container" class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div id="status" class="status" aria-live="polite">Loading...</div>
            <div id="timer" class="timer">00:00</div>

            <div class="control-buttons-container">
                <button id="pause-button" class="icon-btn" aria-label="Pause">
                    <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" aria-hidden="true">
                        <path d="M360-320h80v-320h-80v320Zm160 0h80v-320h-80v320ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>
                    <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" style="display:none;" aria-hidden="true">
                        <path d="m380-300 280-180-280-180v360ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>
                </button>

                <button id="mic-button" class="mic-button" aria-label="Start or stop recording">
                    <span class="mic-glow" aria-hidden="true"></span>
                    <span class="mic-ring" aria-hidden="true"></span>
                    <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>

                <button id="cancel-button" class="icon-btn" aria-label="Cancel">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" aria-hidden="true">
                        <path d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>
                </button>
            </div>

            <div id="spinner-container" class="spinner-container">
                <div class="spinner"></div>
                <div class="spinner-text">Processing your audio...</div>
            </div>
        </div>

        <!-- Transcription Area -->
        <div class="transcript-area card-animate" style="--card-index: 1;">
            <div class="transcript-header">
                <h2 class="transcript-title">Transcription</h2>
                <div>
                    <button id="grab-text-button" class="clear-btn" aria-label="Cut text to clipboard">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Cut
                    </button>
                </div>
            </div>
            <textarea id="transcript" class="transcript-content" placeholder="Transcription will appear here..."></textarea>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">API Settings</h3>
                <button id="close-modal" class="close-button" aria-label="Close settings dialog">&times;</button>
            </div>

            <div class="form-group">
                <label for="settings-model-select">Model</label>
                <select id="settings-model-select">
                    <option value="whisper">Whisper (Stable)</option>
                    <option value="mai-transcribe">MAI-Transcribe (Preview)</option>
                </select>
            </div>

            <input type="hidden" id="recording-environment" value="quiet">

            <div id="whisper-settings" style="display: none;">
                <h4 class="settings-section-title">Whisper</h4>
                <div class="form-group">
                    <label for="whisper-uri">Target URI</label>
                    <input type="text" id="whisper-uri" placeholder="https://your-resource.openai.azure.com/openai/deployments/whisper/audio/transcriptions?api-version=2024-06-01">
                    <small>Copy the full URL from Azure Portal</small>
                </div>
                <div class="form-group">
                    <label for="whisper-key">API Key</label>
                    <input type="password" id="whisper-key" placeholder="Enter Whisper API key">
                </div>
            </div>

            <div id="mai-transcribe-settings" style="display: none;">
                <h4 class="settings-section-title">MAI-Transcribe</h4>
                <div class="form-group">
                    <label for="mai-transcribe-uri">Target URI</label>
                    <input type="text" id="mai-transcribe-uri" placeholder="https://your-resource.cognitiveservices.azure.com/speechtotext/transcriptions:transcribe?api-version=2025-10-15">
                    <small>Copy the endpoint from Azure Foundry Portal</small>
                </div>
                <div class="form-group">
                    <label for="mai-transcribe-key">API Key</label>
                    <input type="password" id="mai-transcribe-key" placeholder="Enter Speech resource key">
                </div>
            </div>

            <button id="save-settings" class="save-button">Save Settings</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
