<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-theme">
    <!-- Noise texture overlay -->
    <div class="noise-overlay" aria-hidden="true"></div>

    <header>
        <div class="wordmark">
            <span class="wordmark-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                </svg>
            </span>
            <h1>whisper<span class="wordmark-dot">.</span></h1>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="header-btn" aria-label="Toggle theme">
                <svg id="theme-icon" class="header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path id="moon-icon" style="display:block;" d="M12 11.807C10.7418 10.5483 9.88488 8.94484 9.53762 7.1993C9.19037 5.45375 9.36832 3.64444 10.049 2C8.10826 2.38205 6.3256 3.33431 4.92899 4.735C1.02399 8.64 1.02399 14.972 4.92899 18.877C8.83499 22.783 15.166 22.782 19.072 18.877C20.4723 17.4805 21.4245 15.6983 21.807 13.758C20.1625 14.4385 18.3533 14.6164 16.6077 14.2692C14.8622 13.9219 13.2588 13.0651 12 11.807V11.807Z"/>
                    <path id="sun-icon" style="display:none;" d="M12 17C14.7614 17 17 14.7614 17 12C17 9.23858 14.7614 7 12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17Z M12 1V3 M12 21V23 M4.22 4.22L5.64 5.64 M18.36 18.36L19.78 19.78 M1 12H3 M21 12H23 M4.22 19.78L5.64 18.36 M18.36 5.64L19.78 4.22"/>
                </svg>
            </button>
            <button id="settings-button" class="header-btn" aria-label="Settings">
                <svg class="header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="container" role="main">
        <!-- Controls Area - Now the hero -->
        <div class="controls-area card-animate" style="--card-index: 0;">
            <div class="model-selector">
                <label for="model-select" class="sr-only">Model:</label>
                <select id="model-select">
                    <option value="whisper">Whisper (Stable)</option>
                    <option value="mai-transcribe">MAI-Transcribe (Preview)</option>
                </select>
            </div>

            <!-- Visualizer -->
            <div id="visualizer-container" class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div id="status" class="status" aria-live="polite">Loading...</div>
            <div id="timer" class="timer">00:00</div>

            <div class="control-buttons-container">
                <button id="pause-button" class="icon-btn" aria-label="Pause">
                    <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" aria-hidden="true">
                        <path d="M360-320h80v-320h-80v320Zm160 0h80v-320h-80v320ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>

                    <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" style="display:none;" aria-hidden="true">
                        <path d="m380-300 280-180-280-180v360ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>
                </button>

                <button id="mic-button" class="mic-button" aria-label="Start or stop recording">
                    <span class="mic-glow" aria-hidden="true"></span>
                    <span class="mic-ring" aria-hidden="true"></span>
                    <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>

                <button id="cancel-button" class="icon-btn" aria-label="Cancel">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" aria-hidden="true">
                        <path d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                    </svg>
                </button>
            </div>

            <div id="spinner-container" class="spinner-container">
                <div class="spinner"></div>
                <div class="spinner-text">Processing your audio...</div>
            </div>
        </div>

        <!-- Transcription Area -->
        <div class="transcript-area card-animate" style="--card-index: 1;">
            <div class="transcript-header">
                <h2 class="transcript-title">Transcription</h2>
                <div>
                    <button id="grab-text-button" class="clear-btn" aria-label="Cut text to clipboard">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Cut
                    </button>
                </div>
            </div>
            <textarea id="transcript" class="transcript-content" placeholder="Transcription will appear here..."></textarea>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Settings</h3>
                <button id="close-modal" class="close-button" aria-label="Close settings dialog">&times;</button>
            </div>

            <!-- Theme Settings -->
            <div class="form-group">
                <label for="theme-mode">Theme</label>
                <select id="theme-mode">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto (Follow System)</option>
                </select>
            </div>

            <!-- Recording Environment -->
            <div class="form-group">
                <label for="recording-environment">Environment</label>
                <select id="recording-environment">
                    <option value="quiet">Quiet room (best quality)</option>
                    <option value="noisy">Noisy environment</option>
                </select>
            </div>

            <!-- Model Selection -->
            <div class="form-group">
                <label for="settings-model-select">Model</label>
                <select id="settings-model-select">
                    <option value="whisper">Whisper (Stable)</option>
                    <option value="mai-transcribe">MAI-Transcribe (Preview)</option>
                </select>
            </div>

            <!-- Whisper Settings -->
            <div id="whisper-settings" style="display: none;">
                <h4 class="settings-section-title">Whisper</h4>
                <div class="form-group">
                    <label for="whisper-uri">Target URI</label>
                    <input type="text" id="whisper-uri" placeholder="https://your-resource.openai.azure.com/openai/deployments/whisper/audio/transcriptions?api-version=2024-06-01">
                    <small>Copy the full URL from Azure Portal</small>
                </div>
                <div class="form-group">
                    <label for="whisper-key">API Key</label>
                    <input type="password" id="whisper-key" placeholder="Enter Whisper API key">
                </div>
            </div>

            <!-- MAI-Transcribe Settings -->
            <div id="mai-transcribe-settings" style="display: none;">
                <h4 class="settings-section-title">MAI-Transcribe</h4>
                <div class="form-group">
                    <label for="mai-transcribe-uri">Target URI</label>
                    <input type="text" id="mai-transcribe-uri" placeholder="https://your-resource.cognitiveservices.azure.com/speechtotext/transcriptions:transcribe?api-version=2025-10-15">
                    <small>Copy the endpoint from Azure Foundry Portal</small>
                </div>
                <div class="form-group">
                    <label for="mai-transcribe-key">API Key</label>
                    <input type="password" id="mai-transcribe-key" placeholder="Enter Speech resource key">
                </div>
            </div>

            <button id="save-settings" class="save-button">Save Settings</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
